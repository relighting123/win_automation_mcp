skills:
  demo_app_mgmt_tools:
    description: "app_mgmt_tool 계열 도구 사용 예시"
    tools:
      - tool: launch_application
        args:
          wait_for_window: true

      - tool: get_connection_status

      - tool: connect_to_application
        args:
          window_title_re: ".*Notepad\\+\\+.*"

      - tool: restart_application

      - tool: generate_locators
        args:
          window_type: "active_window"

      - tool: close_application
        args:
          force: false

  demo_app_control_tools:
    description: "app_control_tool 계열 도구 사용 예시"
    tools:
      - tool: launch_application

      - tool: find_app_by_ocr
        args:
          keyword: "{keyword}"
          language: "kor+eng"
          timeout: 2.0
          match_mode: "contains"

      - tool: click_app_by_text
        args:
          keyword: "Save"
          match_mode: "contains"
          case_sensitive: false
          button: "left"
          clicks: 1

      - tool: type_app_text
        args:
          text: "hello {username}"
          interval: 0.03

      - tool: press_app_shortcut
        args:
          shortcut: "ctrl+s"

      - tool: click_app_position
        args:
          x: 640
          y: 360
          button: "left"
          clicks: 1

      - tool: click_app_by_keyword
        args:
          keyword: "Submit"
          element_type: "button"
          match_mode: "contains"
          case_sensitive: false
          button: "left"
          clicks: 1

      - tool: click_app_by_attr
        args:
          auto_id: "SaveBtn_1"
          control_type: "Button"
          title: "Save"
          title_match_mode: "exact"
          button: "left"
          double: false
          timeout: 2.0
          draw_outline: true
          outline_colour: "red"

      - tool: highlight_app_by_attr
        args:
          title: "Cancel"
          control_type: "Button"
          timeout: 2.0
          outline_colour: "green"

      - tool: get_app_coords_by_attr
        args:
          auto_id: "MainInputArea"
          control_type: "Edit"
          timeout: 2.0

      - tool: wait
        args:
          seconds: 1.0

  demo_full_flow_tools:
    description: "launch -> 입력 -> 클릭 -> 종료까지 도구 조합 예시"
    tools:
      - tool: launch_application
      - tool: type_app_text
        args:
          text: "Auto scenario for {username}"
      - tool: press_app_shortcut
        args:
          shortcut: "ctrl+s"
      - tool: click_app_by_keyword
        args:
          keyword: "{confirm_keyword}"
          element_type: "any"
      - tool: close_application
        args:
          force: false
