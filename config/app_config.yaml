# Application Configuration for Windows Automation
# FastMCP + pywinauto 기반 윈도우 자동화 설정

application:
  # 타겟 애플리케이션 경로(프로그램 실행시 사용)
  executable_path: "C:\\Program Files\\Notepad++\\notepad++.exe"
  # 애플리케이션 이름 (프로세스 실행 중인지 등을 판단하는 용도)
  process_name: "notepad++.exe"
  # 윈도우 제목 정규식 (연결 시 사용)
  # window_title_re: ".*Notepad\\+\\+.*"
  # pywinauto backend 설정 (uia 권장)
  backend: "uia"
  # 애플리케이션 시작 후 초기화 대기 시간 (초)
  startup_timeout: 30
  # 자동화 속도 설정 (fast, normal)
  automation_speed: "fast"

timeouts:
  # 기본 요소 대기 시간 (초)
  default_wait: 10
  # 긴 작업 대기 시간 (초)
  long_wait: 60
  # 짧은 작업 대기 시간 (초)
  short_wait: 3
  # 재시도 간격 (초)
  retry_interval: 0.1
  # UI 조작 후 대기 시간 (초)
  ui_delay: 0.1
  # 포커스 설정 후 대기 시간 (초)
  after_focus_delay: 0.1
  
retry:
  # 기본 재시도 횟수
  default_attempts: 3
  # 연결 재시도 횟수
  connection_attempts: 5

logging:
  # 로그 레벨 (DEBUG, INFO, WARNING, ERROR)
  level: "INFO"
  # 로그 파일 경로
  file_path: "logs/automation.log"
  # 로그 파일 최대 크기 (MB)
  max_size_mb: 10
  # 로그 파일 보관 개수
  backup_count: 5

server:
  # FastMCP 서버 이름
  name: "Windows Automation MCP Server"
  # 서버 버전
  version: "1.0.0"

mcp:
  # FastMCP 서버 HTTP endpoint
  base_url: "http://localhost:8000/mcp"

automation:
  # 자동화 모드 설정 (auto: 자유 계획 및 개입, semi: 순차 실행 + 상황 개입, manual: 순차 실행 전용)
  mode: "manual"

# ─────────────────────────────────────────────────────────────────────────────
# LLM 설정 (Dual-LLM)
#
# - llm.reasoning : 계획, 상황 판단, 클립보드/리포트 분석 같은 사고력 중심 작업.
#                   외부 LLM (Groq, OpenAI 호환 API 등) 권장.
# - llm.task      : 파라미터 추출, 스킬 ID 매핑 같이 입력→구조화 출력에 가까운 단순 작업.
#                   파인튜닝된 Gemma 등 경량 로컬 LLM 권장.
#
# 한쪽만 설정해도 동작합니다. task 가 비어 있으면 reasoning LLM 이 그대로 재사용됩니다.
# 환경변수로도 override 가능합니다:
#   REASONING_LLM_BASE_URL / REASONING_LLM_API_KEY / REASONING_LLM_MODEL
#   TASK_LLM_BASE_URL      / TASK_LLM_API_KEY      / TASK_LLM_MODEL
#
# provider 가 "gemma" 인 경우 structured output 은 자동으로 json_mode (또는 프롬프트 기반
# JSON fallback) 로 처리되므로 OpenAI 의 tools/function-calling 미지원으로 인한
# 오류 걱정을 덜 수 있습니다.
# ─────────────────────────────────────────────────────────────────────────────
llm:
  # (선택) 레거시 단일 LLM 키 — 두 역할 공통으로 적용됩니다.
  # base_url: "https://api.groq.com/openai/v1"
  # model: "openai/gpt-oss-120b"
  # api_key: ""

  reasoning:
    provider: "openai"
    base_url: "https://api.groq.com/openai/v1"
    model: "openai/gpt-oss-120b"
    api_key: ""
    structured_output_method: "function_calling"
    temperature: 0

  task:
    provider: "gemma"
    # vLLM/Ollama 등 로컬에서 띄운 Gemma 서버의 OpenAI 호환 endpoint
    base_url: "http://localhost:8001/v1"
    model: "google/gemma-3-4b-it"
    # 로컬 서버가 키 검증을 하지 않는 경우 빈 문자열로 둡니다.
    api_key: ""
    # Gemma 는 OpenAI tools 미지원이므로 json_mode 가 안전합니다.
    structured_output_method: "json_mode"
    temperature: 0
