skills:
  demo_app_mgmt_tools:
    description: "app_mgmt_tool 계열 도구 사용 예시"
    tools:
      - tool: launch_application
        args:
          wait_for_window: true

      - tool: get_connection_status

      - tool: connect_to_application
        args:
          window_title_re: ".*Notepad\\+\\+.*"

      - tool: restart_application

      - tool: generate_locators
        args:
          window_type: "active_window"

      - tool: close_application
        args:
          force: false

  demo_app_control_tools:
    description: "app_control_tool 계열 도구 사용 예시"
    tools:
      - tool: launch_application

      - tool: find_app_by_ocr
        args:
          keyword: "{keyword}"
          language: "kor+eng"
          timeout: 2.0
          match_mode: "contains"

      - tool: click_app_by_attr
        args:
          title: "Save"
          title_match_mode: "contains"
          case_sensitive: false
          button: "left"
          clicks: 1

      - tool: type_app_text
        args:
          text: "hello {username}"
          interval: 0.03

      - tool: press_app_shortcut
        args:
          shortcut: "ctrl+s"

      - tool: click_app_position
        args:
          x: 640
          y: 360
          button: "left"
          clicks: 1

      - tool: click_app_by_keyword
        args:
          keyword: "Submit"
          element_type: "button"
          match_mode: "contains"
          case_sensitive: false
          button: "left"
          clicks: 1

      - tool: click_app_by_attr
        args:
          auto_id: "SaveBtn_1"
          control_type: "Button"
          title: "Save"
          title_match_mode: "exact"
          button: "left"
          double: false
          timeout: 2.0
          draw_outline: true
          outline_colour: "red"

      - tool: highlight_app_by_attr
        args:
          title: "Cancel"
          control_type: "Button"
          timeout: 2.0
          outline_colour: "green"

      - tool: get_app_coords_by_attr
        args:
          auto_id: "MainInputArea"
          control_type: "Edit"
          timeout: 2.0

      - tool: wait
        args:
          seconds: 1.0

  # demo_full_flow_tools 및 demo_mixed_args는 각각 skills/ 폴더로 이동되었습니다.

  analyze_copied_table:
    description: "Ctrl+C로 복사된 데이터를 DataFrame으로 변환해 분석 리포트에 반영"
    tools:
      - tool: press_app_shortcut
        args:
          shortcut: "ctrl+c"
      - tool: read_clipboard_as_dataframe
        args:
          delimiter: null
          header: true
          max_preview_rows: 20

  open_guide_based_rule:
    description: "사용자 요청에 따라 가이드 문서를 참조하여 적절한 .rul 파일을 선택하고 실행"
    tools:
      - tool: launch_application
        args:
          executable_path: { mode: "ai", value: "D:\\개발\\폴더\\default.rul" }
      - tool: wait
        args:
          seconds: 2.0

  edit_source_section:
    description: "파일 내 특정 소스 구간을 찾아 원하는 코드로 수정"
    tools:
      - tool: find_source_in_file
        args:
          file_path: { mode: "ai" }
          query: { mode: "ai" }
          match_mode: "contains"
          case_sensitive: false
          context_lines: 2
          max_matches: 10
      - tool: replace_source_in_file
        args:
          file_path: { mode: "ai" }
          search_text: { mode: "ai" }
          replacement_text: { mode: "ai" }
          match_mode: "exact"
          replace_all: false
          occurrence: 1
          case_sensitive: true
          dry_run: false
