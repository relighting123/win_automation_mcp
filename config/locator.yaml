# Optional locator config
# Active-window 기반 자동화를 기본으로 사용하며,
# 필요 시 특정 UIA 요소를 여기에 매핑해 사용할 수 있습니다.

active_window:
  window:
    title: "Target Application"
    control_id: "0"
    auto_id: "MainWindow"
    uia_control_type: "Window"
  elements:
    submit_button:
      path: "top"
      auto_id: "btnSubmit"
      control_id: "1001"
      uia_control_type: "Button"
      description: "예시 제출 버튼"
  child_windows:
    find:
      window:
        title: "Find"
        control_id: "2000"
        auto_id: "FindDlg"
        uia_control_type: "Window"
      elements:
        close:
          path: "top/child_windows/find"
          auto_id: "Close"
          control_id: "2002"
          uia_control_type: "Button"
          description: "Find child window 닫기(X)"
